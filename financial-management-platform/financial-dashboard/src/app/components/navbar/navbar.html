<nav class="navbar">
  <div class="navbar__start">
    <!-- Hamburger: mobile only, opens sidebar drawer -->
    <button *ngIf="isLoggedIn()" class="navbar__hamburger" type="button" (click)="sidebar.toggle()" aria-label="Open menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="navbar__brand">💰 Finance Dashboard</div>
  </div>
  <div class="navbar__actions">
    <div class="navbar__tabs" *ngIf="!isLoggedIn() && !isLoginOrRegister()">
      <a routerLink="/login" routerLinkActive="navbar__tab--active" class="navbar__tab">Login</a>
      <a routerLink="/register" routerLinkActive="navbar__tab--active" class="navbar__tab">Register</a>
    </div>
    <div *ngIf="isLoggedIn()" class="navbar__month-nav" aria-label="Selected month">
      <button class="navbar__month-btn" type="button" (click)="prevMonth()" aria-label="Previous month">◀</button>
      <span class="navbar__month-label" (click)="openPicker()" title="Pick month">{{ monthLabel() }}</span>
      <input
        #monthPicker
        type="month"
        class="navbar__month-picker"
        [value]="monthPickerValue"
        (change)="onPickerChange($event)"
        tabindex="-1"
        aria-hidden="true"
      />
      <button class="navbar__month-btn" type="button" (click)="nextMonth()" aria-label="Next month">▶</button>
    </div>
    <button *ngIf="!isLoggedIn()" class="navbar__theme-toggle" type="button" [attr.aria-pressed]="isDarkTheme()" (click)="toggleTheme()">
      <span class="navbar__theme-text">{{ isDarkTheme() ? 'Dark' : 'Light' }}</span>
      <span class="navbar__theme-track" [class.navbar__theme-track--dark]="isDarkTheme()">
        <span class="navbar__theme-thumb"></span>
      </span>
    </button>
  </div>
</nav>
