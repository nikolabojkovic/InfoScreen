<nav class="navbar">
  <div class="navbar__brand">💰 Finance Dashboard</div>
  <div class="navbar__actions">
    <div class="navbar__tabs">
      <ng-container *ngIf="isLoggedIn(); else authLinks">
        <a routerLink="/budget" routerLinkActive="navbar__tab--active" class="navbar__tab">Budget</a>
        <a routerLink="/transactions" routerLinkActive="navbar__tab--active" class="navbar__tab">Transactions</a>
        <a routerLink="/categories" routerLinkActive="navbar__tab--active" class="navbar__tab">Categories</a>
      </ng-container>
      <ng-template #authLinks>
        <a *ngIf="!isLoginOrRegister()" routerLink="/login" routerLinkActive="navbar__tab--active" class="navbar__tab">Login</a>
        <a *ngIf="!isLoginOrRegister()" routerLink="/register" routerLinkActive="navbar__tab--active" class="navbar__tab">Register</a>
      </ng-template>
    </div>
    <div *ngIf="isLoggedIn()" class="navbar__month-nav" aria-label="Selected month">
      <button class="navbar__month-btn" type="button" (click)="prevMonth()" aria-label="Previous month">◀</button>
      <span class="navbar__month-label">{{ monthLabel() }}</span>
      <button class="navbar__month-btn" type="button" (click)="nextMonth()" aria-label="Next month">▶</button>
    </div>
    <button class="navbar__theme-toggle" type="button" [attr.aria-pressed]="isDarkTheme()" (click)="toggleTheme()">
      <span class="navbar__theme-text">{{ isDarkTheme() ? 'Dark' : 'Light' }}</span>
      <span class="navbar__theme-track" [class.navbar__theme-track--dark]="isDarkTheme()">
        <span class="navbar__theme-thumb"></span>
      </span>
    </button>
  </div>
</nav>
