<div class="user-menu">
  <!-- Avatar trigger -->
  <button class="user-menu__avatar" type="button" (click)="toggle()" [class.user-menu__avatar--dark]="isDarkTheme()" [attr.aria-expanded]="isOpen()" aria-haspopup="true" [attr.aria-label]="'User menu for ' + fullName()">
    {{ initials() }}
  </button>

  <!-- Dropdown -->
  <div class="user-menu__dropdown" *ngIf="isOpen()" role="menu">
    <!-- Profile header -->
    <div class="user-menu__header">
      <div class="user-menu__header-avatar">{{ initials() }}</div>
      <div class="user-menu__header-info">
        <span class="user-menu__header-name">{{ fullName() }}</span>
        <span class="user-menu__header-username">{{ username() }}</span>
      </div>
    </div>

    <div class="user-menu__divider"></div>

    <!-- Account Settings (not implemented) -->
    <button class="user-menu__item user-menu__item--disabled" type="button" disabled role="menuitem">
      <svg class="user-menu__item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      Account Settings
    </button>

    <!-- Dark Mode toggle -->
    <button class="user-menu__item user-menu__item--toggle" type="button" (click)="toggleTheme()" role="menuitem">
      <svg class="user-menu__item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      Dark Mode
      <span class="user-menu__theme-track" [class.user-menu__theme-track--dark]="isDarkTheme()">
        <span class="user-menu__theme-thumb"></span>
      </span>
    </button>

    <div class="user-menu__divider"></div>

    <!-- Logout -->
    <button class="user-menu__item user-menu__item--danger" type="button" (click)="logout()" role="menuitem">
      <svg class="user-menu__item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Logout
    </button>
  </div>
</div>
