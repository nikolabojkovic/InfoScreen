<div class="categories">
  <h1 class="categories__title">Categories</h1>

  <div class="categories__card">
    <h2 class="categories__card-title">Add Category</h2>
    <form (ngSubmit)="addCategory()" class="categories__form-col">
      <div class="categories__form-row">
        <div class="categories__field">
          <label class="categories__label">Name</label>
          <input type="text" [(ngModel)]="name" name="name" placeholder="Category name" required class="categories__input" />
        </div>
        <div class="categories__field categories__field--color">
          <label class="categories__label">Color</label>
          <input type="color" [(ngModel)]="color" name="color" class="categories__input categories__input--color" />
        </div>
      </div>
      <div class="categories__items-section">
        <label class="categories__label">Category Items</label>
        <div class="categories__items-list">
          <div *ngFor="let item of items; let i = index" class="categories__item-row categories__item-add-row">
            <input type="text" [(ngModel)]="items[i].description" name="item-desc-{{i}}" placeholder="Description" required class="categories__input categories__input--item" />
            <input type="number" [(ngModel)]="items[i].amount" name="item-amount-{{i}}" placeholder="Amount" min="0.01" step="0.01" required class="categories__input categories__input--item" />
            <button type="button" class="btn btn--sm btn--danger" (click)="removeItem(i)">Remove</button>
          </div>
        </div>
        <div class="categories__item-add-row">
          <input type="text" [(ngModel)]="newItem.description" name="new-item-desc" placeholder="Description" required class="categories__input categories__input--item" />
          <input type="number" [(ngModel)]="newItem.amount" name="new-item-amount" placeholder="Amount" min="0.01" step="0.01" required class="categories__input categories__input--item" />
          <button type="button" class="btn btn--sm btn--primary" (click)="addItem()" [disabled]="!newItem.description || newItem.amount <= 0">Save Item</button>
        </div>
      </div>
      <div class="categories__submit-row">
        <button type="submit" class="btn btn--primary" 
          [disabled]="!name.trim() || items.length === 0 || items.some(item => !item.description || item.amount <= 0)">
          + Add
        </button>
      </div>
    </form>
  </div>

  <div class="categories__card">
    <div class="table-responsive">
    <table class="table">
      <thead>
        <tr>
          <th class="table__header" style="width: 40px"></th>
          <th class="table__header">Category Name</th>
          <th class="table__header">Monthly Budget</th>
          <th class="table__header" style="width: 140px">Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (cat of categories(); track cat.id) {
          @if (editingId() === cat.id) {
            <tr class="categories__row--editing">
              <td class="table__cell"><input type="color" [(ngModel)]="editColor" class="categories__input--color-small" /></td>
              <td class="table__cell" colspan="2">
                <input type="text" [(ngModel)]="editName" class="categories__input--inline" style="margin-bottom: 8px;" />
                <div style="margin-bottom: 8px;"><strong>Category Items</strong></div>
                <div *ngFor="let item of editItems; let i = index" class="categories__item-row">
                  <input type="text" [(ngModel)]="editItems[i].description" name="edit-item-desc-{{i}}" placeholder="Description" required class="categories__input categories__input--item" style="margin-right: 12px;" />
                  <input type="number" [(ngModel)]="editItems[i].amount" name="edit-item-amount-{{i}}" placeholder="Amount" min="0.01" step="0.01" required class="categories__input categories__input--item" style="margin-right: 12px;" />
                  <button type="button" class="btn btn--sm btn--danger" (click)="removeEditItem(i)">Remove</button>
                </div>
                <button type="button" class="btn btn--sm btn--primary" (click)="addEditItem()" style="margin-top: 8px;">Add Item</button>
              </td>
              <td class="table__cell categories__actions">
                <button class="categories__btn-save" (click)="saveEdit(cat)"
                  [disabled]="!editName.trim() || editItems.some(item => !item.description || item.amount <= 0)">&#x2713; Save</button>
                <button class="categories__btn-cancel" (click)="cancelEdit()">&#x2715; Cancel</button>
              </td>
            </tr>
          } @else {
            <tr>
              <td class="table__cell"><span class="categories__color-dot" [style.background]="cat.color"></span></td>
              <td class="table__cell">{{ cat.name }}</td>
              <td class="table__cell">
                <span class="dual-currency">
                  <span class="dual-currency__rsd">{{ cat.budgetAmount | number:'1.2-2' }} RSD</span>
                  <span class="dual-currency__eur">{{ cat.budgetAmount | toEur }} €</span>
                </span>
              </td>
              <td class="table__cell categories__actions">
                <button class="categories__btn-edit" (click)="startEdit(cat)" title="Edit">&#x270E;</button>
                <button class="categories__btn-delete" (click)="deleteCategory(cat.id)" title="Delete">&#x2715;</button>
              </td>
            </tr>
          }
        } @empty {
          <tr><td colspan="4" class="table__cell categories__empty">No categories defined yet.</td></tr>
        }
      </tbody>
    </table>
    </div>
  </div>
</div>
